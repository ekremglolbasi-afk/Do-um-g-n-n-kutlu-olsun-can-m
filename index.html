<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aşkım İçin ❤️</title>
<style>
    /* Grundlegendes Styling */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #ffcccc; color: #333; text-align: center; overflow-x: hidden; }

    /* Fliegende Herzen Animation */
    @keyframes heartAnimation {
        0% { transform: translateY(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
    }
    .floating-heart {
        position: fixed; color: #ff6666; font-size: 20px;
        animation: heartAnimation 10s linear infinite;
        z-index: -1; /* Hinter dem Inhalt */
    }

    /* Container und Überschriften */
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    h1 { color: #cc0000; margin-bottom: 10px; }
    h2 { color: #660000; margin-bottom: 20px; font-weight: normal; }

    /* Timer Styling */
    .timer-box { background-color: rgba(255, 255, 255, 0.8); padding: 15px; border-radius: 10px; margin-bottom: 20px; display: inline-block; }
    .timer-data { font-weight: bold; font-size: 1.2em; color: #cc0000; }

    /* Bildergalerie-Styling */
    .gallery-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 30px; }
    .gallery-item {
        width: 150px; height: 150px; border-radius: 10px; overflow: hidden;
        border: 3px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        transition: transform 0.3s ease;
    }
    .gallery-item:hover { transform: scale(1.1); }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

    /* Button Styling */
    .hikaye-btn, .surpriz-btn {
        background-color: #cc0000; color: #fff; border: none; padding: 10px 20px;
        border-radius: 20px; cursor: pointer; font-size: 1em; margin-top: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: background-color 0.3s ease;
    }
    .hikaye-btn:hover, .surpriz-btn:hover { background-color: #990000; }

    /* Überraschungs-Bild Container (versteckt) */
    #surpriz-resim-container { display: none; margin-top: 20px; text-align: center; }
    #surpriz-resim { max-width: 90%; max-height: 400px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }

</style>
</head>
<body>

    <script>
        for (let i = 0; i < 25; i++) {
            let heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(heart);
        }
    </script>

    <div class="container">
        <h1>İyi ki Doğdun Aşkım ❤️</h1>
        <h2>Bu web sitesi sadece senin için hazırlandı.</h2>

        <div class="timer-box">
            Doğum gününe son <span class="timer-data" id="dogumgunu-sayac">0 gün ve 9 saat</span>! 🎁<br>
            <span class="timer-data" id="iliski-sayac">328 gündür</span> birlikteyiz ❤️
        </div>

        <br>

        <div class="gallery-container">
            <div class="gallery-item"><img src="foto1.jpg" alt="Aşkım Foto 1"></div>
            <div class="gallery-item"><img src="foto2.jpg" alt="Aşkım Foto 2"></div>
            <div class="gallery-item"><img src="foto3.jpg" alt="Aşkım Foto 3"></div>
            <div class="gallery-item"><img src="foto4.jpg" alt="Aşkım Foto 4"></div>
            <div class="gallery-item"><img src="foto5.jpg" alt="Aşkım Foto 5"></div>
            <div class="gallery-item"><img src="foto6.jpg" alt="Aşkım Foto 6"></div>
        </div>

        <br>
        <button class="hikaye-btn">Hikayemizi Oku ↓</button>
        <br>

        <button class="surpriz-btn" id="surpriz-btn">Bir sürpriz var! 🎁</button>
        
        <div id="surpriz-resim-container">
            <img src="surpriz.jpg" alt="Sürpriz Bild" id="surpriz-resim">
        </div>

    </div>

    <script>
        document.getElementById('surpriz-btn').addEventListener('click', function() {
            var surprizContainer = document.getElementById('surpriz-resim-container');
            if (surprizContainer.style.display === 'none' || surprizContainer.style.display === '') {
                surprizContainer.style.display = 'block';
                this.innerText = 'Kapat x'; // Button-Text ändert sich
            } else {
                surprizContainer.style.display = 'none';
                this.innerText = 'Bir sürpriz var! 🎁'; // Button-Text ändert sich zurück
            }
        });
    </script>

</body>
</html>
