<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi ki Doğdun ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); 
            min-height: 100vh;
            text-align: center;
            color: #d63384;
            overflow-x: hidden;
        }

        /* Fliegende Herzen */
        .heart {
            position: fixed; top: -10vh; font-size: 20px;
            animation: fall 10s linear forwards; opacity: 0.8; z-index: 0;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .container { position: relative; z-index: 1; padding: 20px; max-width: 800px; margin: 0 auto; }

        h1 { font-size: 2.2rem; margin-top: 20px; text-shadow: 1px 1px 2px white; }
        .subtitle { font-size: 1rem; margin-bottom: 20px; opacity: 0.8; }

        /* Timer Box */
        .timer-container {
            background: rgba(255, 255, 255, 0.4);
            padding: 15px; border-radius: 20px; margin-bottom: 25px;
            border: 1px solid white;
        }
        .timer-text { font-size: 1.1rem; font-weight: bold; margin: 5px 0; }

        /* Bilder Galerie - Sauber ohne Text */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-top: 20px;
        }
        .gallery-item {
            aspect-ratio: 1 / 1;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid white;
        }
        .gallery-item img {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* Buttons */
        button {
            background: #d63384; color: white; border: none;
            padding: 12px 25px; border-radius: 25px; font-weight: bold;
            margin-top: 20px; cursor: pointer; transition: 0.3s;
        }
        button:hover { transform: scale(1.05); background: #b82a6f; }

        /* Überraschungs-Sektion */
        #surpriz-area { display: none; margin-top: 20px; animation: fadeIn 1s; }
        #surpriz-area img { width: 100%; max-width: 400px; border-radius: 15px; border: 4px solid white; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>İyi ki Doğdun Aşkım ❤️</h1>
    <p class="subtitle">Sadece senin için, sevgiyle.</p>

    <div class="timer-container">
        <p class="timer-text" id="bday-timer">Yükleniyor...</p>
        <p class="timer-text" id="love-timer">Yükleniyor...</p>
    </div>

    <div class="gallery">
        <!-- Hier sind deine exakten Dateinamen vom iPad -->
        <div class="gallery-item"><img src="foto 01.jpeg"></div>
        <div class="gallery-item"><img src="foto 02.jpeg"></div>
        <div class="gallery-item"><img src="foto 03.jpeg"></div>
        <div class="gallery-item"><img src="foto 04.jpeg"></div>
        <div class="gallery-item"><img src="foto 05.jpeg"></div>
        <div class="gallery-item"><img src="foto 06.jpeg"></div>
    </div>

    <button onclick="showSurpriz()">Bir sürpriz var! 🎁</button>

    <div id="surpriz-area">
        <img src="surpriz.jpeg">
        <p style="margin-top:10px; font-weight:bold;">Seni çok seviyorum! ❤️</p>
    </div>
</div>

<script>
    // Timer Logik
    function updateTimers() {
        const now = new Date();
        const bday = new Date("2026-03-20T00:00:00");
        const start = new Date("2025-04-25");

        // Countdown
        const diff = bday - now;
        if(diff > 0) {
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            document.getElementById("bday-timer").innerHTML = `Doğum gününe son: ${d} GÜN, ${h} SAAT, ${m} DAKİKA`;
        } else {
            document.getElementById("bday-timer").innerHTML = "İYİ Kİ DOĞDUN PRENSESİM! 🎉";
        }

        // Beziehung
        const diffLove = now - start;
        const dLove = Math.floor(diffLove / (1000 * 60 * 60 * 24));
        document.getElementById("love-timer").innerHTML = `${dLove} gündür birlikteyiz ❤️`;
    }
    setInterval(updateTimers, 1000);
    updateTimers();

    // Überraschung zeigen
    function showSurpriz() {
        const area = document.getElementById("surpriz-area");
        area.style.display = area.style.display === "block" ? "none" : "block";
    }

    // Herz-Regen
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = Math.random() * 3 + 4 + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 10000);
    }
    setInterval(createHeart, 400);
</script>

</body>
</html>
