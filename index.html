<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Für dich ❤️</title>

<style>
/* ... (Dein bisheriges CSS bleibt größtenteils gleich, hier die Ergänzungen) ... */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
    scroll-behavior:smooth;
}

body{
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    color:white;
    overflow-x:hidden;
}

.hearts span {
    position: fixed;
    bottom: -50px;
    font-size: 20px;
    animation: float 8s linear infinite;
    opacity: 0.7;
    pointer-events: none; /* Verhindert, dass man aus Versehen auf Herzen klickt */
}

@keyframes float {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
}

section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease-out;
}

section.show {
    opacity: 1;
    transform: translateY(0);
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 10px;
    width: 95%;
    max-width: 600px;
    margin-top: 20px;
}

.gallery img {
    width: 100%;
    height: 120px; /* Einheitliche Höhe */
    object-fit: cover; /* Bilder werden schön beschnitten, nicht gequetscht */
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* ... Rest deines Styles (Buttons, Popups etc.) ... */
button {
    margin-top: 25px;
    padding: 15px 30px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #ff4b6e;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

button:hover { transform: scale(1.05); background: #fff0f3; }

.popup {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); display: flex; justify-content: center;
    align-items: center; visibility: hidden; opacity: 0; transition: 0.4s; z-index: 1000;
}

.popup.active { visibility: visible; opacity: 1; }
.popup-content { background: white; color: black; padding: 30px; border-radius: 20px; max-width: 85%; text-align: center; }
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<section class="show">
    <h1>Alles Gute zum Geburtstag ❤️</h1>
    <p>Diese Webseite ist nur für dich, mein Schatz.</p>
    <div id="countdown" style="font-weight: bold; margin: 15px 0;"></div>
    <div id="loveCounter" style="font-size: 1rem; opacity: 0.9;"></div>
    
    <div class="gallery">
        <!-- Achte darauf, dass diese Dateien in deinem GitHub-Ordner liegen! -->
        <img src="foto1.jpg" alt="Wir">
        <img src="foto2.jpg" alt="Wir">
        <img src="foto3.jpg" alt="Wir">
        <img src="foto4.jpg" alt="Wir">
        <img src="foto5.jpg" alt="Wir">
        <img src="foto6.jpg" alt="Wir">
    </div>
    <button onclick="scrollNext()">Unsere Geschichte lesen ↓</button>
</section>

<section>
    <h1>Unsere Geschichte 📖</h1>
    <p>Am 25.04.2025 hat unsere Geschichte begonnen...<br>Ein Moment, der mein Leben verändert hat.</p>
</section>

<!-- ... (Deine restlichen Sections) ... -->

<div class="popup" id="popup">
    <div class="popup-content">
        <h2>Für dich ❤️</h2>
        <p>Ich liebe dich über alles! Danke für jeden Tag.</p>
        <button onclick="closePopup()">Schließen</button>
    </div>
</div>

<script>
/* Scroll-Erkennung */
const sections = document.querySelectorAll("section");
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if(entry.isIntersecting) entry.target.classList.add("show");
    });
}, { threshold: 0.2 });

sections.forEach(sec => observer.observe(sec));

function scrollNext(){
    window.scrollBy({top: window.innerHeight, behavior: "smooth"});
}

/* Countdown & Counter */
function updateTimers() {
    const now = new Date().getTime();
    
    // Geburtstag (20. März)
    const bday = new Date("2026-03-20T00:00:00").getTime();
    const diffBday = bday - now;
    if(diffBday > 0) {
        const d = Math.floor(diffBday / (1000*60*60*24));
        const h = Math.floor((diffBday % (1000*60*60*24)) / (1000*60*60));
        document.getElementById("countdown").innerHTML = `Noch ${d} Tage und ${h} Stunden! 🎁`;
    } else {
        document.getElementById("countdown").innerHTML = "HAPPY BIRTHDAY! 🎂🎉";
    }

    // Beziehung
    const start = new Date("2025-04-25").getTime();
    const diffLove = now - start;
    const dLove = Math.floor(diffLove / (1000*60*60*24));
    document.getElementById("loveCounter").innerHTML = `Wir sind seit ${dLove} Tagen unzertrennlich ❤️`;
}
setInterval(updateTimers, 1000);
updateTimers();

/* Herzen-Generator */
setInterval(() => {
    const heart = document.createElement("span");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 5) + "s";
    document.getElementById("hearts").appendChild(heart);
    setTimeout(() => heart.remove(), 8000);
}, 450);

function openPopup() { document.getElementById("popup").classList.add("active"); }
function closePopup() { document.getElementById("popup").classList.remove("active"); }
</script>

</body>
</html>
