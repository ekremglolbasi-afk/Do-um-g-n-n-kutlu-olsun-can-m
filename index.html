<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi ki Doğdun Askim ❤️</title>
    <style>
        /* Grunddesign */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); 
            min-height: 100vh;
            text-align: center;
            color: #d63384;
            overflow-x: hidden;
        }

        /* Herz-Regen im Hintergrund */
        .heart {
            position: fixed; top: -10vh; font-size: 20px;
            animation: fall 8s linear forwards; opacity: 0.6; z-index: 0;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .container { position: relative; z-index: 1; padding: 20px; max-width: 600px; margin: 0 auto; }

        h1 { font-size: 2.5rem; margin-top: 30px; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(255,255,255,0.5); }
        .intro-text { font-size: 1.1rem; margin-bottom: 30px; font-style: italic; }

        /* Timer Bereich */
        .stats-box {
            background: rgba(255, 255, 255, 0.5);
            padding: 20px;
            border-radius: 25px;
            margin-bottom: 30px;
            border: 1px solid white;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
        }
        .timer-line { font-size: 1.2rem; font-weight: bold; margin: 8px 0; display: block; }

        /* Die Bildergalerie (Ohne Text) */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 Bilder nebeneinander */
            gap: 15px;
            margin-bottom: 30px;
        }
        .photo-card {
            background: white;
            padding: 8px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transform: rotate(-2deg);
            transition: 0.3s;
        }
        .photo-card:nth-child(even) { transform: rotate(2deg); }
        .photo-card:hover { transform: rotate(0deg) scale(1.05); }

        .photo-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 10px;
        }

        /* Überraschungs-Button */
        .btn-surpriz {
            background: #ff4b6e;
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 75, 110, 0.4);
            transition: 0.3s;
            margin-bottom: 40px;
        }
        .btn-surpriz:hover { background: #e03a5a; transform: translateY(-3px); }

        /* Verstecktes Überraschungsbild (Foto 7) */
        #surpriz-section {
            display: none;
            margin-top: 20px;
            padding-bottom: 50px;
            animation: slideUp 0.8s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        #surpriz-section img {
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            border: 5px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .surpriz-text { margin-top: 15px; font-size: 1.3rem; font-weight: bold; }

    </style>
</head>
<body>

<div class="container">
    <h1>İyi ki Doğdun! ❤️</h1>
    <p class="intro-text">Sadece senin için hazırladığım küçük bir hediye...</p>

    <div class="stats-box">
        <span class="timer-line" id="bday-countdown">Yükleniyor...</span>
        <span class="timer-line" id="love-counter">Yükleniyor...</span>
    </div>

    <div class="photo-grid">
        <!-- Deine Bilder vom iPad-Screenshot -->
        <div class="photo-card"><img src="foto 01.jpeg"></div>
        <div class="photo-card"><img src="foto 02.jpeg"></div>
        <div class="photo-card"><img src="foto 03.jpeg"></div>
        <div class="photo-card"><img src="foto 04.jpeg"></div>
        <div class="photo-card"><img src="foto 05.jpeg"></div>
        <div class="photo-card"><img src="foto 06.jpeg"></div>
    </div>

    <button class="btn-surpriz" onclick="toggleSurpriz()">Bir sürpriz var! 🎁</button>

    <div id="surpriz-section">
        <img src="foto 07.png">
        <p class="surpriz-text">Seni çok seviyorum! ❤️</p>
    </div>
</div>

<script>
    // 1. Geburtstag Countdown (Morgen!)
    function updateTimers() {
        const now = new Date();
        const bday = new Date("2026-03-20T00:00:00");
        const start = new Date("2025-04-25");

        // Geburtstag Countdown
        const diff = bday - now;
        if(diff > 0) {
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            document.getElementById("bday-countdown").innerHTML = `Doğum gününe: ${d} gün, ${h} saat, ${m} dakika kaldı!`;
        } else {
            document.getElementById("bday-countdown").innerHTML = "İYİ Kİ DOĞDUN MELEĞİM! 🎂🎉";
        }

        // Wie lange zusammen (328+ Tage)
        const diffLove = now - start;
        const dLove = Math.floor(diffLove / (1000 * 60 * 60 * 24));
        document.getElementById("love-counter").innerHTML = `${dLove} gündür seninle her şey daha güzel ❤️`;
    }
    setInterval(updateTimers, 1000);
    updateTimers();

    // 2. Überraschung zeigen (Foto 7)
    function toggleSurpriz() {
        const section = document.getElementById("surpriz-section");
        if (section.style.display === "block") {
            section.style.display = "none";
        } else {
            section.style.display = "block";
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    }

    // 3. Herzchen fallen lassen
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = Math.random() * 3 + 5 + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
    }
    setInterval(createHeart, 400);
</script>

</body>
</html>
